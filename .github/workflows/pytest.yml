name: API 自动化测试

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行测试
        run: |
          pytest --alluredir=report/allure_results --clean-alluredir
        continue-on-error: true

      - name: 生成 Allure 报告
        uses: simple-joy/allure-report-action@v1.9
        if: always()
        with:
          allure_results: report/allure_results
          allure_history: report/allure-history
          allure_report: report/allure-report

      - name: 发布 Allure 报告到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: report/allure-report
          keep_files: true