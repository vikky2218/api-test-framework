name: API 自动化测试

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行测试
        run: |
          pytest --alluredir=report/allure_results --clean-alluredir
        continue-on-error: true

      - name: 安装 Allure 命令行工具
        run: |
          ALLURE_VERSION=2.33.0
          wget -q https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
          tar -xzf allure-${ALLURE_VERSION}.tgz
          echo "$(pwd)/allure-${ALLURE_VERSION}/bin" >> $GITHUB_PATH

      - name: 生成 Allure 报告
        if: always()
        run: |
          allure generate report/allure_results -o report/allure-report --clean

      - name: 发布 Allure 报告到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: report/allure-report
          keep_files: true